version: "1"

scope:
  include_public: true
  include_private: false
  include_archived: false
  include_forked: false
  # include_repos:
  #   - api
  #   - web
  exclude_repos:
    - sandbox

output:
  format: table      # table | json | csv | sarif
  # path: results.sarif

notify:
  slack:
    enabled: false
    # --- Delivery method (choose one) ---
    # Webhook (simplest): one URL posts to a single fixed channel.
    # webhook_url: https://hooks.slack.com/services/xxx  # prefer GIT_CASCADE_SLACK_WEBHOOK env var
    #
    # Bot token (flexible): supports per-channel routing via repository_channels.
    # bot_token: xoxb-...  # prefer GIT_CASCADE_SLACK_BOT_TOKEN env var
    #
    # --- Default channel ---
    # channel: "#compliance"  # fallback for repos not listed in repository_channels
    #
    # --- Per-repo channel routing (requires bot_token) ---
    # repository_channels:
    #   - channels: "#ops, #security"
    #     repositories: "api, backend"
    #   - channels: "#frontend"
    #     repositories: "web, dashboard"
    #
    # results_url is a runtime value — use --slack-results-url flag or GIT_CASCADE_SLACK_RESULTS_URL env var
  issues:
    enabled: false
    mode: compliance   # compliance (one consolidated issue) | repo (one issue per failing repo)
    # compliance_repo: myorg/compliance  # defaults to <org>/compliance
    labels:
      - compliance
      - automated
